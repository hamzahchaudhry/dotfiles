# ==========================================
# session
# ==========================================

# monitors
monitor = eDP-1,preferred,0x0,1
monitor = HDMI-A-1,highrr,0x-1080,1

# autostart
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user start hyprpolkitagent
exec-once = systemctl --user start foot-server.socket

exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = rm -f /tmp/wobpipe && mkfifo /tmp/wobpipe && tail -f /tmp/wobpipe | wob

exec-once = mako
exec-once = aa-notify -p -s 1 -w 60 -f /var/log/audit/audit.log
exec-once = swaybg -i /home/hamzah/.local/share/wallpapers/GOODS-North.png -m fill
exec-once = waybar

# environment
env = QT_QPA_PLATFORMTHEME,qt6ct
