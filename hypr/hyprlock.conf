# ==========================================
# hyprlock
# ==========================================

general:hide_cursor = true

background {
    path = screenshot
    blur_passes = 2
}

# time
label {
    text = cmd[update:60000] date '+%I:%M %p'
    font_size = 96
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 90
    shadow_passes = 1
}

# date
label {
    text = cmd[update:3600000] date '+%A, %B %d, %Y'
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, -5
    shadow_passes = 1
}

# password field
input-field {
    size = 460, 62
    outer_color = rgba(255, 255, 255, 0.25)
    inner_color = rgba(255, 255, 255, 0.19)
    font_color = rgba(255, 255, 255, 1.0)
    font_family = JetBrainsMono Nerd Font
    capslock_color = rgba(255, 204, 102, 0.87)
    shadow_passes = 1
    placeholder_text = <i>Password</i>
    fade_on_empty = false
    hide_input = true
    position = 0, -85
}
