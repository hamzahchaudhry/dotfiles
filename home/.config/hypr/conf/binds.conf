# ==========================================
# keybindings
# ==========================================

$mainMod = SUPER
$terminal = footclient
$browser = firefox
$editor = zeditor
$discord_client = vesktop
$app_launcher = fuzzel

$task_client = footclient --app-id taskterm sh -c "task limit:20; exec $SHELL"
$qalc_client = footclient --app-id qalcterm sh -c "qalc; exec $SHELL"

$emoji_picker = rofimoji --selector fuzzel -a copy
$clipboard_menu = cliphist list | fuzzel --dmenu | cliphist decode | wl-copy
$clipboard_wipe = cliphist wipe && notify-send -a Clipboard -i edit-delete "Clipboard" "History cleared"
$screenshot_region = hyprshot -m region --clipboard-only --freeze
$reload_waybar = pkill waybar; waybar &
$toggle_waybar = pkill -SIGUSR1 waybar

# session and windows
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod ALT, R, exec, hyprctl reload && notify-send "Hyprland" "Config reloaded"
bind = $mainMod, F, fullscreen, 1

# app launchers
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, A, exec, $editor
bind = $mainMod, C, exec, $qalc_client
bind = $mainMod, Z, exec, $discord_client
bind = $mainMod, D, exec, $app_launcher
bind = $mainMod, T, exec, $task_client

# desktop utilities
bind = $mainMod, PERIOD, exec, $emoji_picker
bind = $mainMod, V, exec, $clipboard_menu
bind = $mainMod SHIFT, V, exec, $clipboard_wipe
bind = $mainMod SHIFT, S, exec, $screenshot_region
bind = $mainMod, R, exec, $reload_waybar
bind = $mainMod, less, exec, $toggle_waybar

# focus movement
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# mouse
bindm = $mainMod, mouse:272, movewindow

# media and hardware
bindel = ,XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/wob-volume.sh up
bindel = ,XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/wob-volume.sh down
bindel = ,XF86AudioMute, exec, ~/.config/hypr/scripts/wob-volume.sh mute

bindel = ,XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/wob-brightness.sh down
bindel = ,XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/wob-brightness.sh up

bind = ,XF86TouchpadOff, exec, notify-send -c off -i input-touchpad "Touchpad" "Disabled"
bind = ,XF86TouchpadOn, exec, notify-send -c on -i input-touchpad "Touchpad" "Enabled"

bind = ,XF86PowerOff, exec, hyprlock

bindr = CAPS, Caps_Lock, exec, ~/.config/hypr/scripts/caps-osd.sh
